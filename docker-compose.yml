version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - server
    networks:
      - crewkill-network

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_CONVEX_URL=${NEXT_PUBLIC_CONVEX_URL}
        - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
    environment:
      - NEXT_PUBLIC_CONVEX_URL=${NEXT_PUBLIC_CONVEX_URL}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
    networks:
      - crewkill-network

  server:
    build:
      context: ./server
    environment:
      - PORT=8080
      - CONVEX_URL=${CONVEX_URL}
      - PACKAGE_ID=${PACKAGE_ID}
      - GAME_MANAGER_ID=${GAME_MANAGER_ID}
      - WAGER_VAULT_ID=${WAGER_VAULT_ID}
      - AGENT_REGISTRY_ID=${AGENT_REGISTRY_ID}
      - MARKET_REGISTRY_ID=${MARKET_REGISTRY_ID}
      - MINT_CAP_ID=${MINT_CAP_ID}
      - ONECHAIN_RPC=${ONECHAIN_RPC}
      - OPERATOR_PRIV_KEY=${OPERATOR_PRIV_KEY}
      - KEEPER_ENABLED=${KEEPER_ENABLED}
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED}
      - NEXT_PUBLIC_CONVEX_URL=${NEXT_PUBLIC_CONVEX_URL}
    networks:
      - crewkill-network

  agent:
    build:
      context: ./agent
    environment:
      - SERVER_API_URL=http://server:8080
      - WS_SERVER_URL=ws://server:8080/ws
      - PRIVATE_KEY_1=${PRIVATE_KEY_1}
      - PRIVATE_KEY_2=${PRIVATE_KEY_2}
      - PRIVATE_KEY_3=${PRIVATE_KEY_3}
      - PRIVATE_KEY_4=${PRIVATE_KEY_4}
      - PRIVATE_KEY_5=${PRIVATE_KEY_5}
      - PRIVATE_KEY_6=${PRIVATE_KEY_6}
      - PACKAGE_ID=${PACKAGE_ID}
      - GAME_MANAGER_ID=${GAME_MANAGER_ID}
      - WAGER_VAULT_ID=${WAGER_VAULT_ID}
      - AGENT_REGISTRY_ID=${AGENT_REGISTRY_ID}
      - MARKET_REGISTRY_ID=${MARKET_REGISTRY_ID}
      - MINT_CAP_ID=${MINT_CAP_ID}
      - ONECHAIN_RPC=${ONECHAIN_RPC}
      - DISABLE_WAGERS=${DISABLE_WAGERS:-true}
    depends_on:
      - server
    networks:
      - crewkill-network

networks:
  crewkill-network:
    driver: bridge
